<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" role="img" aria-label="Charpente">
  <rect width="512" height="512" rx="96" fill="#1f2937"/>
  <!-- toiture 2 pans + entrait + poinçon -->
  <g stroke="#f8fafc" stroke-width="22" stroke-linejoin="round" stroke-linecap="round" fill="none">
    <polygon points="96,352 256,176 416,352" fill="#b45309" fill-opacity="0.18"/>
    <line x1="96" y1="352" x2="416" y2="352"/>
    <line x1="256" y1="352" x2="256" y2="176"/>
  </g>
  <!-- repères de pannes -->
  <g fill="#f59e0b">
    <circle cx="256" cy="176" r="16"/>
    <circle cx="96" cy="352" r="16"/>
    <circle cx="416" cy="352" r="16"/>
    <circle cx="176" cy="264" r="14"/>
    <circle cx="336" cy="264" r="14"/>
  </g>
</svg>
